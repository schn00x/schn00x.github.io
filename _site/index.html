<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>schn00x</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      margin: 0 auto 1rem;
      display: block;
      object-fit: cover;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
      color: #111;
    }

    .bio {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 2rem;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 20px;
      border-radius: 20px;
      background: #111;
      color: white;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      transition: opacity 0.15s;
    }

    .link-btn:hover { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="card">
    
      <img class="avatar" src="https://github.com/schn00x.png" alt="schn00x">
    

    <h1>schn00x</h1>
    <p class="bio">testing things</p>

    <div class="links">
      
        <a class="link-btn" href="https://github.com/schn00x">
          <span>⚡</span>
          <span>GitHub</span>
        </a>
      
        <a class="link-btn" href="https://www.vinted.at/member/3123811166-moritzs900">
          <span>🧦</span>
          <span>Vinted</span>
        </a>
      
    </div>
  </div>
</body>
</html>
